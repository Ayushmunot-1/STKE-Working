<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>STKE Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #09080f; color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px; padding: 40px; min-height: 100vh;
    }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo { font-size: 28px; color: #818cf8; }
    h1 { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: 0.1em; }
    .container { max-width: 520px; }
    .section {
      background: #0f0e1a; border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px; padding: 24px; margin-bottom: 20px;
    }
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #818cf8; margin-bottom: 16px;
    }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 10px 14px; background: #161428;
      border: 1px solid rgba(99,102,241,0.2); border-radius: 8px;
      color: #e2e8f0; font-size: 13px; outline: none;
    }
    input:focus { border-color: #6366f1; }
    .hint { font-size: 11px; color: #4b5563; margin-top: 4px; }
    .save-btn {
      padding: 11px 28px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none; border-radius: 9px; color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .save-btn:hover { opacity: 0.85; }
    .saved-msg {
      margin-left: 12px; font-size: 12px; color: #34d399;
      opacity: 0; transition: opacity 0.3s;
    }
    .saved-msg.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">⬡</span>
      <h1>STKE Settings</h1>
    </div>

    <div class="section">
      <div class="section-title">Backend Server</div>
      <div class="field">
        <label>API URL</label>
        <input type="url" id="api-url" placeholder="http://localhost:8000" />
        <p class="hint">Where your STKE Python server is running</p>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Ollama</div>
      <div class="field">
        <label>Ollama URL</label>
        <input type="url" id="ollama-url" placeholder="http://localhost:11434" />
      </div>
      <div class="field">
        <label>Extraction Model</label>
        <input type="text" id="ollama-model" placeholder="llama3.2" />
      </div>
    </div>

    <button class="save-btn" id="btn-save">Save Settings</button>
    <span class="saved-msg" id="saved-msg">✓ Saved!</span>
  </div>

  <script>
    async function load() {
      const s = await chrome.storage.sync.get({
        apiUrl: "http://localhost:8000",
        ollamaUrl: "http://localhost:11434",
        ollamaModel: "llama3.2",
      });
      document.getElementById("api-url").value = s.apiUrl;
      document.getElementById("ollama-url").value = s.ollamaUrl;
      document.getElementById("ollama-model").value = s.ollamaModel;
    }

    document.getElementById("btn-save").addEventListener("click", async () => {
      await chrome.storage.sync.set({
        apiUrl: document.getElementById("api-url").value.trim(),
        ollamaUrl: document.getElementById("ollama-url").value.trim(),
        ollamaModel: document.getElementById("ollama-model").value.trim(),
      });
      const msg = document.getElementById("saved-msg");
      msg.classList.add("show");
      setTimeout(() => msg.classList.remove("show"), 2000);
    });

    load();
  </script>
</body>
</html>
